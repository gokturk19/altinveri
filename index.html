<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sağlamoğlu Altın - Canlı Fiyatlar (3sn)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; }
        .price-card { background: #2c2c2c; border-radius: 15px; border: 1px solid #444; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .table { color: #fff; border-color: #444; }
        .table thead { background-color: #d4af37; color: #000; }
        .price-up { color: #2ecc71; font-weight: bold; font-family: monospace; font-size: 1.1rem; }
        .price-down { color: #e74c3c; font-weight: bold; font-family: monospace; font-size: 1.1rem; }
        .live-badge { background: #e74c3c; animation: blink 1s infinite; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .update-time { color: #888; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="price-card">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="m-0" style="color: #d4af37;">Sağlamoğlu Altın Canlı</h2>
            <div class="live-badge">CANLI 3sn</div>
        </div>
        
        <div id="price-table-container" class="table-responsive">
            <table class="table table-dark table-hover">
                <thead>
                    <tr>
                        <th>Ürün</th>
                        <th>Alış</th>
                        <th>Satış</th>
                        <th>Saat</th>
                    </tr>
                </thead>
                <tbody id="price-body">
                    <tr><td colspan="4" class="text-center">Veriler yükleniyor...</td></tr>
                </tbody>
            </table>
        </div>
        <div id="last-update" class="update-time text-end mt-2"></div>
    </div>
</div>

<script src="saglamoglu_fast.js"></script>
<script>
    SaglamogluAPI.start(function(data) {
        const body = document.getElementById('price-body');
        let html = '';
        
        data.forEach(item => {
            html += `
                <tr>
                    <td><strong>${item.name}</strong></td>
                    <td class="price-up">${item.buy.toLocaleString('tr-TR', {minimumFractionDigits: 2})} ₺</td>
                    <td class="price-down">${item.sell.toLocaleString('tr-TR', {minimumFractionDigits: 2})} ₺</td>
                    <td><small class="text-muted">${item.time}</small></td>
                </tr>
            `;
        });
        
        body.innerHTML = html;
        document.getElementById('last-update').innerText = 'Son Veri: ' + new Date().toLocaleTimeString('tr-TR');
    });
</script>

</body>
</html>
